name: Auto Generate Types

on:
  schedule:
    - cron: '30 * * * *'
  push:
    branches: [master]
  repository_dispatch:
    types: [auto-generate-types]
  workflow_dispatch: # for manual testing

permissions:
  contents: read

jobs:
  auto-generate:
    runs-on: ubuntu-latest
    steps:
      # setup
      - uses: actions/checkout@v6
      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci

      # we used to download `types` branch here, but looks like we don't need that anymore, and can skip linting old types

      # generate and lint types
      - name: Generate types
        id: generate
        run: npm start -- --new-revisions-only --best-effort --cache-discovery-json ${{ runner.temp }}/discovery-json
        env:
          GAPI_DIAGNOSTICS_DIR: ${{ runner.temp }}/type-generation-diagnostics
      - name: Lint types
        id: lint
        run: npm run lint
        env:
          GAPI_BEST_EFFORT: true
          GAPI_DIAGNOSTICS_DIR: ${{ runner.temp }}/type-generation-diagnostics
          GAPI_MAX_PARALLEL: 3

      - name: Upload skipped type diagnostics
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: skipped-type-diagnostics
          path: ${{ runner.temp }}/type-generation-diagnostics
          if-no-files-found: ignore

      # upload types on success
      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4 # cspell:words peaceiris
        with:
          deploy_key: ${{ secrets.ACTIONS_DEPLOY_KEY }}
          publish_branch: types
          publish_dir: ./types
          allow_empty_commit: false
